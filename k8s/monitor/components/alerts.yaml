apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: system-alerts
  namespace: default
  labels:
    app: kube-prometheus-stack
    release: k8s-monitoring
spec:
  groups:
  - name: backend-alerts
    rules:
    - alert: BackendHighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{pod=~"backend-.*"}[5m])) by (pod) * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Backend pod {{ $labels.pod }} CPU usage is high"
        description: "CPU usage for backend pod {{ $labels.pod }} is {{ $value }}%"

    - alert: BackendHighMemoryUsage
      expr: sum by (pod) (container_memory_working_set_bytes{pod=~"backend-.*"}) / sum by (pod) (kube_pod_container_resource_limits{pod=~"backend-.*"}) * 100 > 85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Backend pod {{ $labels.pod }} memory usage is high"
        description: "Memory usage for backend pod {{ $labels.pod }} is {{ $value }}%"

    - alert: BackendPodDown
      expr: max(kube_deployment_status_replicas_available{deployment="backend"}) == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Backend pod {{ $labels.pod }} is down"
        description: "Backend pod {{ $labels.pod }} has been down for more than 2 minutes"

    - alert: HighHTTPErrorRate
      expr: sum(increase(http_errors_total[1m])) / sum(increase(http_requests_total[1m])) * 100 > 40
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High HTTP 5xx error rate"
        description: "HTTP 5xx error rate is {{ $value }}%"

    - alert: HighAPIResponseTime
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High API response time"
        description: "95th percentile API response time is {{ $value }}s"

    - alert: BackendPodDesiredReplicasNotMet
      expr: kube_deployment_status_replicas{deployment="backend"} < kube_deployment_spec_replicas{deployment="backend"}
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Backend deployment desired replicas not met"
        description: "Backend deployment has {{ $value }} replicas available, which is less than desired"

    - alert: HighFailedLoginRate
      expr: sum(rate(login_attempts_total{success="false"}[1m])) / sum(rate(login_attempts_total[1m])) * 100 > 30
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High failed login rate"
        description: "Failed login rate is {{ $value }}%"

  - name: frontend-alerts
    rules:
    - alert: FrontendHighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{pod=~"frontend-.*"}[5m])) by (pod) * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Frontend pod {{ $labels.pod }} CPU usage is high"
        description: "CPU usage for frontend pod {{ $labels.pod }} is {{ $value }}%"

    - alert: FrontendHighMemoryUsage
      expr: sum by (pod) (container_memory_working_set_bytes{pod=~"frontend-.*"}) / sum by (pod) (kube_pod_container_resource_limits{pod=~"frontend-.*"}) * 100 > 85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Frontend pod {{ $labels.pod }} memory usage is high"
        description: "Memory usage for frontend pod {{ $labels.pod }} is {{ $value }}%"

    - alert: FrontendPodDown
      expr: max(kube_deployment_status_replicas_available{deployment="frontend"}) == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Frontend pod {{ $labels.pod }} is down"
        description: "Frontend pod {{ $labels.pod }} has been down for more than 2 minutes"

    - alert: FrontendPodDesiredReplicasNotMet
      expr: kube_deployment_status_replicas{deployment="frontend"} < kube_deployment_spec_replicas{deployment="frontend"}
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Frontend deployment desired replicas not met"
        description: "Frontend deployment has {{ $value }} replicas available, which is less than desired"

  - name: database-alerts
    rules:
    - alert: DatabasePodDown
      expr: max(kube_statefulset_status_replicas_available{statefulset="postgres"}) == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Database pod {{ $labels.pod }} is down"
        description: "Database pod {{ $labels.pod }} has been down for more than 2 minutes"

    - alert: DatabaseHighDiskUsage
      expr: max(pg_database_size_bytes{datname="dev"}) / max(kube_persistentvolumeclaim_resource_requests_storage_bytes{persistentvolumeclaim="postgres-pvc"}) * 100 > 90
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Database disk usage is high"
        description: "Database disk usage is {{ $value }}%"

    - alert: DatabaseDeadlocks
      expr: increase(pg_stat_database_deadlocks[5m]) > 0
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "Database deadlocks detected"
        description: "Database has experienced deadlocks"

    - alert: DatabaseErrors
      expr: sum by (operation) (increase(db_queries_total{success="false"}[2m])) / sum by (operation) (increase(db_queries_total[2m])) * 100 > 40
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High database error rate for operation {{ $labels.operation }}"
        description: "Database transaction rollback rate is {{ $value }}% for operation {{ $labels.operation }}"

  - name: kubernetes-alerts
    rules:
    - alert: HighNodeCPUUsage
      expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node CPU usage is high"
        description: "Node {{ $labels.instance }} CPU usage is {{ $value }}%"

    - alert: HighNodeMemoryUsage
      expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node memory usage is high"
        description: "Node {{ $labels.instance }} memory usage is {{ $value }}%"

    - alert: PodRestarting
      expr: increase(kube_pod_container_status_restarts_total[10m]) > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is restarting"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times"

    - alert: DeploymentNotReady
      expr: kube_deployment_status_replicas_unavailable > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Deployment {{ $labels.deployment }} has unavailable replicas"
        description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has {{ $value }} unavailable replicas"

    