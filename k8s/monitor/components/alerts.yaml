apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: system-alerts
  namespace: default
  labels:
    release: kube-prometheus-stack
    role: alert-rules
spec:
  groups:
  - name: backend-alerts
    rules:
    - alert: BackendHighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{namespace="default", pod=~"backend-.*"}[5m])) by (pod) * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Backend pod {{ $labels.pod }} CPU usage is high"
        description: "CPU usage for backend pod {{ $labels.pod }} is {{ $value }}%"

    - alert: BackendHighMemoryUsage
      expr: sum(container_memory_usage_bytes{namespace="default", pod=~"backend-.*"}) by (pod) / sum(container_spec_memory_limit_bytes{namespace="default", pod=~"backend-.*"}) by (pod) * 100 > 85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Backend pod {{ $labels.pod }} memory usage is high"
        description: "Memory usage for backend pod {{ $labels.pod }} is {{ $value }}%"

    - alert: BackendPodDown
      expr: up{namespace="default", pod=~"backend-.*"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Backend pod {{ $labels.pod }} is down"
        description: "Backend pod {{ $labels.pod }} has been down for more than 2 minutes"

    - alert: HighHTTPErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) * 100 > 5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High HTTP 5xx error rate"
        description: "HTTP 5xx error rate is {{ $value }}%"

    - alert: HighAPIResponseTime
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High API response time"
        description: "95th percentile API response time is {{ $value }}s"

  - name: frontend-alerts
    rules:
    - alert: FrontendHighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{namespace="default", pod=~"frontend-.*"}[5m])) by (pod) * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Frontend pod {{ $labels.pod }} CPU usage is high"
        description: "CPU usage for frontend pod {{ $labels.pod }} is {{ $value }}%"

    - alert: FrontendHighMemoryUsage
      expr: sum(container_memory_usage_bytes{namespace="default", pod=~"frontend-.*"}) by (pod) / sum(container_spec_memory_limit_bytes{namespace="default", pod=~"frontend-.*"}) by (pod) * 100 > 85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Frontend pod {{ $labels.pod }} memory usage is high"
        description: "Memory usage for frontend pod {{ $labels.pod }} is {{ $value }}%"

    - alert: FrontendPodDown
      expr: up{namespace="default", pod=~"frontend-.*"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Frontend pod {{ $labels.pod }} is down"
        description: "Frontend pod {{ $labels.pod }} has been down for more than 2 minutes"

  - name: database-alerts
    rules:
    - alert: DatabaseHighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{namespace="default", pod=~"postgres-.*"}[5m])) by (pod) * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Database pod {{ $labels.pod }} CPU usage is high"
        description: "CPU usage for database pod {{ $labels.pod }} is {{ $value }}%"

    - alert: DatabaseHighMemoryUsage
      expr: sum(container_memory_usage_bytes{namespace="default", pod=~"postgres-.*"}) by (pod) / sum(container_spec_memory_limit_bytes{namespace="default", pod=~"postgres-.*"}) by (pod) * 100 > 85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Database pod {{ $labels.pod }} memory usage is high"
        description: "Memory usage for database pod {{ $labels.pod }} is {{ $value }}%"

    - alert: DatabasePodDown
      expr: up{namespace="default", pod=~"postgres-.*"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Database pod {{ $labels.pod }} is down"
        description: "Database pod {{ $labels.pod }} has been down for more than 2 minutes"

    - alert: DatabaseHighDiskUsage
      expr: (1 - (sum(container_fs_avail_bytes{namespace="default", pod=~"postgres-.*"}) / sum(container_fs_capacity_bytes{namespace="default", pod=~"postgres-.*"}))) * 100 > 90
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Database disk usage is high"
        description: "Database disk usage is {{ $value }}%"

    - alert: DatabaseDeadlocks
      expr: increase(pg_stat_database_deadlocks[5m]) > 0
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "Database deadlocks detected"
        description: "Database has experienced deadlocks"

    - alert: DatabaseErrors
      expr: increase(pg_stat_database_xact_rollback[5m]) > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High database transaction rollbacks"
        description: "Database has {{ $value }} transaction rollbacks in the last 5 minutes"

  - name: kubernetes-alerts
    rules:
    - alert: HighNodeCPUUsage
      expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node CPU usage is high"
        description: "Node {{ $labels.instance }} CPU usage is {{ $value }}%"

    - alert: HighNodeMemoryUsage
      expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node memory usage is high"
        description: "Node {{ $labels.instance }} memory usage is {{ $value }}%"

    - alert: PodRestarting
      expr: increase(kube_pod_container_status_restarts_total[10m]) > 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is restarting"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times"

    - alert: DeploymentNotReady
      expr: kube_deployment_status_replicas_unavailable > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Deployment {{ $labels.deployment }} has unavailable replicas"
        description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has {{ $value }} unavailable replicas"

  - name: business-metrics-alerts
    rules:
    - alert: HighFailedLoginRate
      expr: rate(login_attempts_total{status="failed"}[5m]) / rate(login_attempts_total[5m]) * 100 > 20
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High failed login rate"
        description: "Failed login rate is {{ $value }}%"

    - alert: LowOrderPlacementRate
      expr: rate(order_placed_total[1h]) < 1
      for: 10m
      labels:
        severity: info
      annotations:
        summary: "Low order placement rate"
        description: "Order placement rate is {{ $value }} per hour"